<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
  text-align:center;
}

input[type=file]{
  width:100%;
  margin:15px 0;
}

button{
  width:100%;
  padding:15px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:18px;
  border-radius:8px;
}

#status{
  margin-top:15px;
  text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Image → PDF Converter</h1>

<input type="file" id="images" multiple accept="image/*">

<button onclick="createPDF()">Convert & Download PDF</button>

<div id="status"></div>

</div>

<script>
async function resizeImage(file) {
  return new Promise((resolve) => {

    const img = new Image();

    img.onload = () => {

      const canvas = document.createElement("canvas");

      const maxWidth = 1200;

      let width = img.width;
      let height = img.height;

      if(width > maxWidth){
        height = height * (maxWidth / width);
        width = maxWidth;
      }

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img,0,0,width,height);

      canvas.toBlob(resolve,"image/jpeg",0.8);
    };

    img.src = URL.createObjectURL(file);
  });
}

async function createPDF(){

  const files =
    document.getElementById("images").files;

  const status =
    document.getElementById("status");

  if(files.length === 0){
    alert("Select at least one image");
    return;
  }

  try{

    status.innerHTML = "Creating PDF...";

    const pdfDoc =
      await PDFLib.PDFDocument.create();

    for(const file of files){

      const compressed =
        await resizeImage(file);

      const bytes =
        await compressed.arrayBuffer();

      const image =
        await pdfDoc.embedJpg(bytes);

      const page =
        pdfDoc.addPage([595,842]);

      const scale =
        Math.min(
          555 / image.width,
          802 / image.height
        );

      const imgWidth =
        image.width * scale;

      const imgHeight =
        image.height * scale;

      page.drawImage(image,{
        x:(595-imgWidth)/2,
        y:(842-imgHeight)/2,
        width:imgWidth,
        height:imgHeight
      });
    }

    const pdfBytes =
      await pdfDoc.save();

    const blob =
      new Blob([pdfBytes],
      {type:"application/pdf"});

    const url =
      URL.createObjectURL(blob);

    const a =
      document.createElement("a");

    a.href = url;
    a.download = "images.pdf";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);

    status.innerHTML =
      "PDF downloaded successfully";

  }catch(err){

    console.error(err);

    status.innerHTML =
      "Error: " + err.message;
  }
}
</script>

</body>
</html>
