<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

/* DROPZONE */
.dropzone{
    border:2px dashed #2563eb;
    border-radius:12px;
    padding:30px;
    text-align:center;
    background:#eff6ff;
    cursor:pointer;
}

/* NOTE */
.note{
    margin-top:15px;
    padding:12px;
    background:#fff7ed;
    border:1px solid #fdba74;
    border-radius:8px;
}

/* GRID */
.preview-grid{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:12px;
}

/* DRAG ITEM */
.preview-item{
    position:relative;
    border-radius:10px;
    overflow:hidden;
    border:2px solid transparent;
    background:#fff;
    cursor:grab;
}

.preview-item.dragging{
    opacity:0.5;
    border:2px dashed #2563eb;
}

.preview-item img{
    width:100%;
    height:120px;
    object-fit:cover;
    display:block;
}

/* REMOVE BUTTON */
.remove-img{
    position:absolute;
    top:5px;
    right:5px;
    background:red;
    color:white;
    border:none;
    width:24px;
    height:24px;
    border-radius:50%;
    cursor:pointer;
}

/* OPTIONS */
.options{
    margin-top:20px;
}

select{
    width:100%;
    padding:10px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

input{
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Image → PDF Converter</h1>

<div class="dropzone" id="dropzone">
    Click or Drop Images Here
</div>

<input type="file" id="images" multiple accept="image/*">

<div class="note">
    Supported: JPG, PNG, WEBP, GIF, BMP, AVIF
</div>

<!-- PREVIEW GRID -->
<div class="preview-grid" id="previewGrid"></div>

<div class="options">
    <select id="pageSize">
        <option value="A4">A4</option>
        <option value="LETTER">Letter</option>
    </select>
</div>

<button id="convertBtn">Convert to PDF</button>

</div>

<script>

const input = document.getElementById("images");
const dropzone = document.getElementById("dropzone");
const grid = document.getElementById("previewGrid");

let selectedFiles = [];

/* OPEN */
dropzone.onclick = () => input.click();

/* INPUT */
input.onchange = () => addFiles(input.files);

/* DROP */
dropzone.ondragover = e => e.preventDefault();
dropzone.ondrop = e => {
    e.preventDefault();
    addFiles(e.dataTransfer.files);
};

/* ADD FILES */
function addFiles(files){
    selectedFiles = [...selectedFiles, ...files];
    render();
}

/* RENDER */
function render(){

    grid.innerHTML = "";

    selectedFiles.forEach((file,index)=>{

        const reader = new FileReader();

        reader.onload = (e)=>{

            const div = document.createElement("div");
            div.className = "preview-item";
            div.draggable = true;
            div.dataset.index = index;

            div.innerHTML = `
                <img src="${e.target.result}">
                <button class="remove-img" onclick="removeFile(${index})">×</button>
            `;

            /* DRAG START */
            div.addEventListener("dragstart", () => {
                div.classList.add("dragging");
                draggedIndex = index;
            });

            div.addEventListener("dragend", () => {
                div.classList.remove("dragging");
            });

            grid.appendChild(div);
        };

        reader.readAsDataURL(file);
    });
}

/* REMOVE */
function removeFile(index){
    selectedFiles.splice(index,1);
    render();
}

/* DRAG REORDER LOGIC */
let draggedIndex = null;

grid.addEventListener("dragover", e => {
    e.preventDefault();

    const afterElement = getDragAfterElement(grid, e.clientY);
    const dragging = document.querySelector(".dragging");

    if(!dragging) return;

    if(afterElement == null){
        grid.appendChild(dragging);
    }else{
        grid.insertBefore(dragging, afterElement);
    }
});

/* CALCULATE POSITION */
function getDragAfterElement(container, y){

    const elements = [...container.querySelectorAll(".preview-item:not(.dragging)")];

    return elements.reduce((closest, child) => {

        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if(offset < 0 && offset > closest.offset){
            return { offset, element: child };
        } else {
            return closest;
        }

    }, { offset: Number.NEGATIVE_INFINITY }).element;
}

/* CONVERT PDF */
document.getElementById("convertBtn").onclick = async () => {

    const pdfDoc = await PDFLib.PDFDocument.create();

    const items = [...document.querySelectorAll(".preview-item img")];

    for(const imgEl of items){

        const response = await fetch(imgEl.src);
        const bytes = await response.arrayBuffer();

        const image = await pdfDoc.embedJpg(bytes);

        const page = pdfDoc.addPage([595,842]);

        const scale = Math.min(
            595 / image.width,
            842 / image.height
        );

        page.drawImage(image,{
            x:(595 - image.width * scale)/2,
            y:(842 - image.height * scale)/2,
            width:image.width * scale,
            height:image.height * scale
        });
    }

    const pdfBytes = await pdfDoc.save();

    const blob = new Blob([pdfBytes],{type:"application/pdf"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "images.pdf";
    a.click();

    URL.revokeObjectURL(url);
};

</script>

</body>
</html>
