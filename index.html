<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#111827;
}

.dropzone{
    border:2px dashed #3b82f6;
    border-radius:10px;
    padding:30px;
    text-align:center;
    cursor:pointer;
    background:#eff6ff;
    transition:.3s;
}

.dropzone:hover{
    background:#dbeafe;
}

.dropzone.dragover{
    background:#bfdbfe;
}

input[type=file]{
    display:none;
}

.options{
    margin-top:20px;
}

select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#fileList{
    margin-top:15px;
    font-size:14px;
    color:#374151;
}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:#111827;
}
</style>

</head>
<body>

<div class="container">

<h1>Image → PDF Converter</h1>

<label class="dropzone" id="dropzone">
    <p>Click or Drag Images Here</p>
    <small>
        JPG, JPEG, PNG, WEBP, GIF, BMP, AVIF
    </small>
</label>

<input
type="file"
id="images"
multiple
accept=".jpg,.jpeg,.png,.webp,.gif,.bmp,.avif,image/*"

>

<div id="fileList"></div>

<div class="options">
    <select id="pageSize">
        <option value="A4">A4</option>
        <option value="LETTER">Letter</option>
    </select>
</div>

<button id="convertBtn">
    Convert & Download PDF
</button>

<div id="status"></div>

</div>

<script>

const input = document.getElementById("images");
const dropzone = document.getElementById("dropzone");
const fileList = document.getElementById("fileList");
const status = document.getElementById("status");

dropzone.addEventListener("click", () => input.click());

dropzone.addEventListener("dragover", e => {
    e.preventDefault();
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", e => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    input.files = e.dataTransfer.files;
    updateFileList();
});

input.addEventListener("change", updateFileList);

function updateFileList(){

    const files = input.files;

    if(!files.length){
        fileList.innerHTML = "";
        return;
    }

    fileList.innerHTML =
        "<strong>Selected Files:</strong><br>" +
        [...files]
        .map(f => f.name)
        .join("<br>");
}

async function fileToImageBlob(file){

    return new Promise((resolve,reject)=>{

        const img = new Image();

        img.onload = () => {

            const canvas =
                document.createElement("canvas");

            const maxWidth = 1800;

            let width = img.width;
            let height = img.height;

            if(width > maxWidth){

                height =
                    height * (maxWidth / width);

                width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx =
                canvas.getContext("2d");

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(
                0,
                0,
                width,
                height
            );

            ctx.drawImage(
                img,
                0,
                0,
                width,
                height
            );

            canvas.toBlob(
                blob => resolve(blob),
                "image/jpeg",
                0.9
            );
        };

        img.onerror = reject;

        img.src =
            URL.createObjectURL(file);
    });
}

document
.getElementById("convertBtn")
.addEventListener("click", createPDF);

async function createPDF(){

    const files = input.files;

    if(files.length === 0){

        alert("Select images first.");
        return;
    }

    try{

        status.innerHTML =
            "Creating PDF...";

        const pdfDoc =
            await PDFLib.PDFDocument.create();

        const pageType =
            document.getElementById("pageSize")
            .value;

        let pageWidth,pageHeight;

        if(pageType === "LETTER"){
            pageWidth = 612;
            pageHeight = 792;
        }
        else{
            pageWidth = 595;
            pageHeight = 842;
        }

        let count = 0;

        for(const file of files){

            count++;

            status.innerHTML =
                `Processing ${count}/${files.length}`;

            const blob =
                await fileToImageBlob(file);

            const bytes =
                await blob.arrayBuffer();

            const image =
                await pdfDoc.embedJpg(bytes);

            const page =
                pdfDoc.addPage([
                    pageWidth,
                    pageHeight
                ]);

            const margin = 20;

            const scale = Math.min(
                (pageWidth - margin * 2)
                / image.width,

                (pageHeight - margin * 2)
                / image.height
            );

            const width =
                image.width * scale;

            const height =
                image.height * scale;

            page.drawImage(image,{
                x:(pageWidth-width)/2,
                y:(pageHeight-height)/2,
                width,
                height
            });
        }

        const pdfBytes =
            await pdfDoc.save();

        const blob =
            new Blob(
                [pdfBytes],
                {
                    type:"application/pdf"
                }
            );

        const url =
            URL.createObjectURL(blob);

        const a =
            document.createElement("a");

        a.href = url;
        a.download = "images.pdf";

        document.body.appendChild(a);
        a.click();
        a.remove();

        setTimeout(()=>{
            URL.revokeObjectURL(url);
        },3000);

        status.innerHTML =
            "PDF downloaded successfully.";

    }
    catch(err){

        console.error(err);

        status.innerHTML =
            "Error: " + err.message;

        alert(err.message);
    }
}
</script>

</body>
</html>
