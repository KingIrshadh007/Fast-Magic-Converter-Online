<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Image to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
:root{
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#111827;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
}

body{
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:950px;
    background:var(--card);
    padding:25px;
    border-radius:16px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    font-size:24px;
}

/* BUTTONS */
button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

/* DROPZONE */
.dropzone{
    margin-top:15px;
    padding:25px;
    border:2px dashed #3b82f6;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

/* GRID */
.grid{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.item{
    position:relative;
}

.item img{
    width:100%;
    height:110px;
    object-fit:cover;
    border-radius:8px;
}

/* CONTROLS */
.controls{
    margin-top:15px;
    display:grid;
    gap:10px;
}

select,input{
    width:100%;
    padding:8px;
}

/* PROGRESS */
.progress{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#22c55e;
    transition:.2s;
}

/* DARK MODE */
.dark-toggle{
    background:#111827;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <h1>Image → PDF Pro</h1>
    <button onclick="toggleDark()">🌙</button>
</div>

<div class="dropzone" id="dropzone">
    Drop or Click Images
</div>

<input type="file" id="input" multiple accept="image/*" hidden>

<!-- CONTROLS -->
<div class="controls">

<select id="layout">
    <option value="1">1 per page</option>
    <option value="2">2 per page</option>
    <option value="4">4 per page</option>
</select>

<label>Compression</label>
<input type="range" id="quality" min="0.3" max="1" step="0.1" value="0.9">

<button onclick="rotateAll()">Rotate 90°</button>

</div>

<!-- PROGRESS -->
<div class="progress"><div class="bar" id="bar"></div></div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<button onclick="generatePDF()" style="margin-top:15px;width:100%;">
Convert PDF
</button>

</div>

<script>

let files = [];
let rotation = 0;

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* OPEN FILE */
document.getElementById("dropzone").onclick = () =>
document.getElementById("input").click();

/* INPUT */
document.getElementById("input").onchange = e=>{
    files.push(...e.target.files);
    render();
};

/* DROP */
document.getElementById("dropzone").ondragover = e=>e.preventDefault();

document.getElementById("dropzone").ondrop = e=>{
    e.preventDefault();
    files.push(...e.dataTransfer.files);
    render();
};

/* RENDER */
function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML="";

    files.forEach((f,i)=>{
        const reader = new FileReader();

        reader.onload = e=>{
            const div = document.createElement("div");
            div.className="item";

            div.innerHTML=`
                <img src="${e.target.result}">
            `;

            grid.appendChild(div);
        };

        reader.readAsDataURL(f);
    });
}

/* ROTATE */
function rotateAll(){
    rotation += 90;
}

/* PDF */
async function generatePDF(){

    const pdf = await PDFLib.PDFDocument.create();

    const layout = Number(document.getElementById("layout").value);
    const quality = Number(document.getElementById("quality").value);

    let progress = document.getElementById("bar");

    for(let i=0;i<files.length;i++){

        progress.style.width =
            ((i+1)/files.length)*100 + "%";

        const bytes = await files[i].arrayBuffer();
        const img = await pdf.embedJpg(bytes);

        const page = pdf.addPage([595,842]);

        let scale = Math.min(
            595/img.width,
            842/img.height
        );

        page.drawImage(img,{
            x:100,
            y:200,
            width:img.width*scale,
            height:img.height*scale
        });

        // PAGE NUMBER
        page.drawText(`Page ${i+1}`,{
            x:280,
            y:20,
            size:12
        });
    }

    const pdfBytes = await pdf.save();

    const blob = new Blob([pdfBytes],{type:"application/pdf"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "pro.pdf";
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
