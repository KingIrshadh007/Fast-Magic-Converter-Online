<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* FIXED CONTAINER */
.container{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* TITLE FIX */
h1{
    text-align:center;
    color:#111827;
    margin-bottom:30px;
    font-size:40px;
}

/* FIXED DROPZONE */
.dropzone{
    width:100%;
    min-height:180px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    border:2px dashed #2563eb;
    border-radius:12px;

    background:#eff6ff;

    text-align:center;
    cursor:pointer;

    transition:.3s;
}

.dropzone:hover{
    background:#dbeafe;
}

.dropzone.dragover{
    background:#bfdbfe;
}

.dropzone h3{
    color:#1d4ed8;
    margin-bottom:10px;
    font-size:28px;
}

.dropzone p{
    color:#6b7280;
    font-size:16px;
}

/* NOTE BOX */
.note{
    margin-top:20px;
    padding:12px;
    background:#fff7ed;
    border:1px solid #fdba74;
    border-radius:8px;
    color:#9a3412;
    font-size:14px;
}

/* FILE LIST */
#fileCount{
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}

#fileList{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.file-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    background:#f9fafb;
}

.file-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width:80%;
}

.remove-btn{
    width:32px;
    height:32px;
    border:none;
    border-radius:50%;
    background:#ef4444;
    color:white;
    cursor:pointer;
}

/* OPTIONS */
.options{
    margin-top:25px;
}

.options label{
    font-weight:bold;
    display:block;
    margin-bottom:8px;
}

select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BUTTON */
.convert-btn{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.convert-btn:hover{
    background:#1d4ed8;
}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

/* HIDE INPUT */
input[type=file]{
    display:none;
}

/* MOBILE */
@media(max-width:600px){
    .container{
        padding:20px;
    }

    h1{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Image → PDF Converter</h1>

<!-- FIXED DROPZONE -->
<div class="dropzone" id="dropzone">
    <h3>Upload Images</h3>
    <p>Click or drag & drop files here</p>
</div>

<input type="file" id="images" multiple accept=".jpg,.jpeg,.png,.webp,.gif,.bmp,.avif">

<div class="note">
    <b>Note:</b> Supported formats: JPG, JPEG, PNG, WEBP, GIF, BMP, AVIF
</div>

<div id="fileCount"></div>
<div id="fileList"></div>

<div class="options">
    <label>PDF Page Size</label>
    <select id="pageSize">
        <option value="A4">A4</option>
        <option value="LETTER">Letter</option>
    </select>
</div>

<button class="convert-btn" id="convertBtn">
    Convert & Download PDF
</button>

<div id="status"></div>

</div>

<script>

const input = document.getElementById("images");
const dropzone = document.getElementById("dropzone");
const fileList = document.getElementById("fileList");
const fileCount = document.getElementById("fileCount");
const status = document.getElementById("status");

let selectedFiles = [];

/* CLICK */
dropzone.addEventListener("click", () => input.click());

/* DRAG */
dropzone.addEventListener("dragover", e => {
    e.preventDefault();
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", e => {
    e.preventDefault();
    dropzone.classList.remove("dragover");

    selectedFiles = [
        ...selectedFiles,
        ...Array.from(e.dataTransfer.files)
    ];

    renderFiles();
});

/* INPUT */
input.addEventListener("change", () => {
    selectedFiles = [
        ...selectedFiles,
        ...Array.from(input.files)
    ];

    renderFiles();
    input.value = "";
});

/* RENDER FILES */
function renderFiles(){

    if(selectedFiles.length === 0){
        fileCount.innerHTML = "";
        fileList.innerHTML = "<p>No files selected.</p>";
        return;
    }

    fileCount.innerHTML = `${selectedFiles.length} file(s) selected`;

    fileList.innerHTML = "";

    selectedFiles.forEach((file,index)=>{

        const div = document.createElement("div");
        div.className = "file-item";

        div.innerHTML = `
            <span class="file-name">${file.name}</span>
            <button class="remove-btn" onclick="removeFile(${index})">✕</button>
        `;

        fileList.appendChild(div);
    });
}

/* REMOVE FILE */
function removeFile(index){
    selectedFiles.splice(index,1);
    renderFiles();
}

/* RESIZE IMAGE */
async function resizeImage(file){

    return new Promise((resolve,reject)=>{

        const img = new Image();

        img.onload = () => {

            const canvas = document.createElement("canvas");

            let width = img.width;
            let height = img.height;

            const maxWidth = 1800;

            if(width > maxWidth){
                height *= maxWidth / width;
                width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");

            ctx.fillStyle = "#fff";
            ctx.fillRect(0,0,width,height);

            ctx.drawImage(img,0,0,width,height);

            canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.9);
        };

        img.onerror = reject;
        img.src = URL.createObjectURL(file);
    });
}

/* CREATE PDF */
document.getElementById("convertBtn").addEventListener("click", createPDF);

async function createPDF(){

    if(selectedFiles.length === 0){
        alert("Please select images first");
        return;
    }

    status.innerHTML = "Creating PDF...";

    const pdfDoc = await PDFLib.PDFDocument.create();

    let pageWidth = 595, pageHeight = 842;

    if(document.getElementById("pageSize").value === "LETTER"){
        pageWidth = 612;
        pageHeight = 792;
    }

    for(const file of selectedFiles){

        const blob = await resizeImage(file);
        const bytes = await blob.arrayBuffer();

        const image = await pdfDoc.embedJpg(bytes);

        const page = pdfDoc.addPage([pageWidth,pageHeight]);

        const scale = Math.min(
            pageWidth / image.width,
            pageHeight / image.height
        );

        const w = image.width * scale;
        const h = image.height * scale;

        page.drawImage(image,{
            x:(pageWidth-w)/2,
            y:(pageHeight-h)/2,
            width:w,
            height:h
        });
    }

    const pdfBytes = await pdfDoc.save();

    const blob = new Blob([pdfBytes],{type:"application/pdf"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "images.pdf";
    a.click();

    URL.revokeObjectURL(url);

    status.innerHTML = "PDF downloaded successfully!";
}

</script>

</body>
</html>
